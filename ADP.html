<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazing Website</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#0f172a;color:white;overflow-x:hidden;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 50px;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px);position:fixed;width:100%;top:0;z-index:1000;}
header h1{color:#38bdf8;}
nav a{margin:0 15px;color:white;text-decoration:none;transition:0.3s;}
nav a:hover{color:#38bdf8;}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#0f172a,#1e293b);}
.hero h2{font-size:3rem;margin-bottom:20px;}
.hero p{max-width:600px;margin-bottom:30px;}
.btn{padding:12px 25px;background:#38bdf8;color:black;border:none;border-radius:25px;cursor:pointer;font-weight:bold;transition:0.3s;}
.btn:hover{transform:scale(1.1);}
.section{padding:100px 50px;text-align:center;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:40px;}
.card{background:#1e293b;padding:20px;border-radius:15px;transition:0.3s;}
.card:hover{transform:translateY(-10px);}
footer{text-align:center;padding:20px;background:#020617;margin-top:50px;}
</style>
</head>
<body>
<header>
<h1>Sanjay🔥</h1>
<nav>
<a href="#">Home</a>
<a href="#features">Features</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Build Something Amazing 🚀</h2>
<p>This is a modern, responsive website with animations and clean UI.</p>
<button class="btn" onclick="showMessage()">Click Me</button>
</section>

<section id="features" class="section">
<h2>Features</h2>
<div class="cards">
<div class="card">
<h3>Fast ⚡</h3>
<p>Optimized for performance.</p>
</div>
<div class="card">
<h3>Responsive 📱</h3>
<p>Works on all devices.</p>
</div>
<div class="card">
<h3>Modern 🎨</h3>
<p>Clean and beautiful design.</p>
</div>
</div>
</section>

<section id="contact" class="section">
<h2>Contact Me</h2>
<input type="text" placeholder="Your Name" style="padding:10px;margin:10px;border-radius:10px;border:none;">
<br>
<input type="email" placeholder="Your Email" style="padding:10px;margin:10px;border-radius:10px;border:none;">
<br>
<button class="btn">Submit</button>
</section>

<footer>
<p>© 2026 Sanjay | Level Up 🔥</p>
</footer>

<script>
function showMessage(){
alert("Welcome Sanjay! Your site is working perfectly 🚀");
}
</script>
</body>
</html>
